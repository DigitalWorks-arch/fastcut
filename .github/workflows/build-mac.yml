name: Build Mac DMG

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Mac DMG
        run: npm run dist:mac

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastCut-Mac-DMG
          path: dist/*.dmg
