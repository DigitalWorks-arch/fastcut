<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FastCut</title>
<style>
  :root {
    color-scheme: light dark;
  }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #f5f5f7;
    color: #1d1d1f;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1e1e1e; color: #f0f0f0; }
    .row, .add-form { background: #2a2a2a !important; border-color: #3a3a3a !important; }
    input { background: #1e1e1e !important; color: #f0f0f0 !important; border-color: #444 !important; }
  }
  .header {
    padding: 16px 20px;
    border-bottom: 1px solid #ddd;
  }
  .header h1 {
    font-size: 18px;
    margin: 0 0 12px 0;
  }
  .add-form {
    display: flex;
    gap: 8px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px;
  }
  input {
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
  }
  #title-input { flex: 1; }
  #url-input { flex: 2; }
  button {
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    background: #0a84ff;
    color: white;
  }
  button:disabled {
    background: #aac9f0;
    cursor: not-allowed;
  }
  .list {
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px 12px;
  }
  .row .info { flex: 1; min-width: 0; }
  .row .title { font-weight: 600; font-size: 13px; }
  .row .url { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .shortcut-box {
    font-size: 12px;
    padding: 6px 10px;
    border: 1px dashed #aaa;
    border-radius: 6px;
    min-width: 110px;
    text-align: center;
    cursor: pointer;
    user-select: none;
  }
  .shortcut-box.recording {
    border-color: #0a84ff;
    color: #0a84ff;
  }
  .icon-btn {
    background: transparent;
    color: #666;
    padding: 4px 8px;
    font-size: 14px;
  }
  .icon-btn:hover { color: #0a84ff; }
  .empty {
    text-align: center;
    color: #888;
    padding: 30px;
    font-size: 13px;
  }
</style>
</head>
<body>
  <div class="header">
    <h1>FastCut</h1>
    <div class="add-form">
      <input id="title-input" type="text" placeholder="Title (e.g. Gmail)" />
      <input id="url-input" type="text" placeholder="https://..." />
      <button id="add-btn">Add</button>
    </div>
  </div>
  <div class="list" id="list"></div>

  <script>
    const listEl = document.getElementById('list');
    const titleInput = document.getElementById('title-input');
    const urlInput = document.getElementById('url-input');
    const addBtn = document.getElementById('add-btn');

    let recordingId = null;

    function normalizeUrl(u) {
      u = u.trim();
      if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
      return u;
    }

    function formatAccelerator(e) {
      const parts = [];
      if (e.ctrlKey) parts.push('Control');
      if (e.metaKey) parts.push('Command');
      if (e.altKey) parts.push('Alt');
      if (e.shiftKey) parts.push('Shift');
      let key = e.key;
      if (['Control', 'Meta', 'Alt', 'Shift'].includes(key)) return null; // modifier only, keep waiting
      if (key === ' ') key = 'Space';
      if (key.length === 1) key = key.toUpperCase();
      parts.push(key);
      return parts.join('+');
    }

    async function render() {
      const items = await window.fastcut.getItems();
      listEl.innerHTML = '';
      if (items.length === 0) {
        listEl.innerHTML = '<div class="empty">No URLs yet — add one above.</div>';
        return;
      }
      items.forEach((item) => {
        const row = document.createElement('div');
        row.className = 'row';

        const info = document.createElement('div');
        info.className = 'info';
        info.innerHTML = `<div class="title">${escapeHtml(item.title)}</div><div class="url">${escapeHtml(item.url)}</div>`;

        const shortcutBox = document.createElement('div');
        shortcutBox.className = 'shortcut-box';
        shortcutBox.textContent = item.shortcut ? item.shortcut.replace(/Control/g,'Ctrl').replace(/Command/g,'Cmd') : 'Set shortcut';
        shortcutBox.onclick = () => startRecording(item.id, shortcutBox);

        const openBtn = document.createElement('button');
        openBtn.className = 'icon-btn';
        openBtn.textContent = '↗';
        openBtn.title = 'Open now';
        openBtn.onclick = () => window.fastcut.openItem(item.url);

        const delBtn = document.createElement('button');
        delBtn.className = 'icon-btn';
        delBtn.textContent = '🗑';
        delBtn.title = 'Delete';
        delBtn.onclick = async () => { await window.fastcut.deleteItem(item.id); render(); };

        row.append(info, shortcutBox, openBtn, delBtn);
        listEl.appendChild(row);
      });
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function startRecording(id, box) {
      if (recordingId) return; // already recording one
      recordingId = id;
      box.textContent = 'Press keys…';
      box.classList.add('recording');

      function handler(e) {
        e.preventDefault();
        const accel = formatAccelerator(e);
        if (!accel) return; // still waiting for a non-modifier key
        document.removeEventListener('keydown', handler, true);
        window.fastcut.updateShortcut(id, accel).then(() => {
          recordingId = null;
          render();
        });
      }
      document.addEventListener('keydown', handler, true);
    }

    addBtn.onclick = async () => {
      const title = titleInput.value.trim();
      const url = urlInput.value.trim();
      if (!title || !url) return;
      await window.fastcut.addItem(title, normalizeUrl(url));
      titleInput.value = '';
      urlInput.value = '';
      render();
    };

    render();
  </script>
</body>
</html>
